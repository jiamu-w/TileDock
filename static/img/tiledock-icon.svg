<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">TileDock Icon</title>
  <desc id="desc">A tiled grid icon with a highlighted docking tile.</desc>
  <defs>
    <linearGradient id="bg" x1="16" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f213d"/>
      <stop offset="1" stop-color="#1d3f70"/>
    </linearGradient>
    <linearGradient id="accent" x1="74" y1="58" x2="106" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb36b"/>
      <stop offset="1" stop-color="#ff8656"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffb36b" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>
  <rect x="8" y="8" width="112" height="112" rx="28" fill="none" stroke="rgba(255,255,255,0.18)"/>

  <g fill="#d8ebff" opacity="0.95">
    <rect x="24" y="24" width="28" height="28" rx="9"/>
    <rect x="58" y="24" width="46" height="28" rx="9" opacity="0.88"/>
    <rect x="24" y="58" width="28" height="46" rx="9" opacity="0.8"/>
    <rect x="58" y="58" width="46" height="46" rx="12" opacity="0.16" stroke="#d8ebff" stroke-width="3" fill="none"/>
  </g>

  <g filter="url(#glow)">
    <rect x="70" y="70" width="34" height="34" rx="11" fill="url(#accent)"/>
    <path d="M81 82h12" stroke="#221208" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M87 76v12" stroke="#221208" stroke-width="4.5" stroke-linecap="round"/>
  </g>
</svg>
