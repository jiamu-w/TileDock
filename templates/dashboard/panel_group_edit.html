{{ define "dashboard/panel_group_edit" }}
<div id="edit-group-{{ .ID }}" class="floating-panel edit-only hidden-panel">
  <div class="floating-backdrop" data-panel-toggle="edit-group-{{ .ID }}"></div>
  <form method="post" action="/navigation/groups/{{ .ID }}" class="card stack floating-card">
    <input type="hidden" name="_csrf" value="{{ .CSRFToken }}">
    <h3>{{ t .Lang "dashboard.group.edit" }}</h3>
    <label><span>{{ t .Lang "dashboard.form.name" }}</span><input class="edit-only" name="name" value="{{ .Name }}" required></label>
    <div class="actions">
      <button class="ghost-btn edit-only" type="submit">{{ t .Lang "dashboard.group.save" }}</button>
      <button class="ghost-btn edit-only" type="button" data-panel-toggle="edit-group-{{ .ID }}">{{ t .Lang "common.cancel" }}</button>
    </div>
  </form>
</div>
{{ end }}
