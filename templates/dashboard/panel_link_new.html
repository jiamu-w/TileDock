{{ define "dashboard/panel_link_new" }}
<div id="add-link-{{ .ID }}" class="floating-panel edit-only hidden-panel">
  <div class="floating-backdrop" data-panel-toggle="add-link-{{ .ID }}"></div>
  <form method="post" action="/navigation/links" class="card stack compact floating-card" enctype="multipart/form-data">
    <input type="hidden" name="_csrf" value="{{ .CSRFToken }}">
    <h3>{{ t .Lang "dashboard.link.new" }}</h3>
    <input type="hidden" name="group_id" value="{{ .ID }}">
    <label><span>{{ t .Lang "dashboard.form.title" }}</span><input name="title" required></label>
    <label><span>{{ t .Lang "dashboard.form.url" }}</span><input name="url" placeholder="https://example.com" required></label>
    <label><span>{{ t .Lang "dashboard.form.description" }}</span><input name="description"></label>
    <label><span>{{ t .Lang "dashboard.form.icon_url" }}</span><input name="icon" placeholder="https://example.com/icon.png"></label>
    <label><span>{{ t .Lang "dashboard.form.icon_file" }}</span><input name="icon_file" type="file" accept=".jpg,.jpeg,.png,.webp,.gif"></label>
    <label class="inline"><input name="open_in_new" type="checkbox" checked> {{ t .Lang "dashboard.form.open_new" }}</label>
    <div class="actions">
      <button class="primary-btn" type="submit">{{ t .Lang "dashboard.link.create" }}</button>
      <button class="ghost-btn" type="button" data-panel-toggle="add-link-{{ .ID }}">{{ t .Lang "common.cancel" }}</button>
    </div>
  </form>
</div>
{{ end }}
